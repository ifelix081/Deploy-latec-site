<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon.ico" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <title>Deploy - Meu Perfil</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-page">

      <div id="sidebar-placeholder"></div>

  <h1 class="page-title" id="page-title-placeholder"></h1>

  <div class="container" style="max-width: 480px;">
    <div class="card-form">

      <div style="text-align:center; margin-bottom:1.2rem;">
        <img id="preview-foto" src="" alt="Foto de perfil" class="avatar-grande" />
        <div style="margin-top:0.8rem;">
          <label for="input-foto" class="btn-secondary btn-small" style="display:inline-block; width:auto; cursor:pointer;">
            Trocar foto
          </label>
          <input type="file" id="input-foto" accept="image/*" style="display:none;" />
        </div>
      </div>

      <p class="label-campo">Nome completo</p>
      <p id="perfil-nome" class="valor-readonly"></p>

      <p class="label-campo">Email</p>
      <p id="perfil-email" class="valor-readonly"></p>

      <p class="label-campo">Cargo</p>
      <p id="perfil-cargo" class="valor-readonly"></p>

      <label class="label-campo" for="perfil-nick">Nick (como aparece pro grupo)</label>
      <input type="text" id="perfil-nick" placeholder="Ex: Tavo, Vini, ..." />

      <button id="btn-salvar-perfil" class="btn-primary btn-small" style="width:auto; margin-top:0.8rem;">Salvar</button>
      <p id="msg-perfil" class="erro" style="display:none;"></p>
    </div>

    <div class="card-form" style="margin-top:1rem;">
      <h3>Discord</h3>

      <div id="discord-nao-conectado">
        <p class="ferramenta-desc" style="margin-top:0;">Conecte sua conta do Discord pra suas medalhas de cargo aparecerem no site.</p>
        <button id="btn-conectar-discord" class="btn-secondary btn-small" style="width:auto;">Conectar Discord</button>
      </div>

      <div id="discord-conectado" style="display:none;">
        <p class="ferramenta-desc" style="margin-top:0;">Conectado como <strong id="discord-username"></strong></p>
        <div id="discord-badges" style="display:flex; flex-wrap:wrap; gap:0.4rem; margin-top:0.6rem;"></div>
      </div>

      <p id="discord-erro" class="erro" style="display:none; margin-top:0.6rem;"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/theme.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/perfil.js"></script>
  <script src="js/discord.js"></script>
  <script src="js/perfil-discord.js"></script>
</body>
</html>
