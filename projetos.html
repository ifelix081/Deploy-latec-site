<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="manifest" href="manifest.json" />
  <link rel="icon" href="icons/favicon.ico" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <title>Deploy - Projetos</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body class="app-page">

    <body class="app-page">

      <div id="sidebar-placeholder"></div>

  <h1 class="page-title" id="page-title-placeholder"></h1>

  <div class="container">

    <div class="ordenacao-bar">
      <label class="label-campo" style="margin:0;">Ordenar por</label>
      <select id="select-ordenacao">
        <option value="recentes">Mais recentes</option>
        <option value="melhor_avaliados">Melhor avaliados</option>
      </select>
    </div>

    <div id="form-novo-projeto" style="display:none;" class="card-form">
      <h3>Novo projeto</h3>
      <input type="text" id="pj-titulo" placeholder="Título do projeto" />
      <textarea id="pj-descricao" placeholder="Descrição (opcional)" rows="3"></textarea>

      <label class="label-campo">Responsável</label>
      <select id="pj-responsavel">
        <option value="">Carregando membros...</option>
      </select>

      <label class="label-campo">Status</label>
      <select id="pj-status">
        <option value="planejamento">Planejamento</option>
        <option value="em_andamento">Em andamento</option>
        <option value="concluido">Concluído</option>
        <option value="pausado">Pausado</option>
      </select>

      <label class="label-campo">Data de início</label>
      <input type="date" id="pj-data-inicio" />

      <button id="btn-criar-projeto" class="btn-primary btn-small">Criar projeto</button>
      <p id="erro-projeto" class="erro" style="display:none;"></p>
    </div>

    <div id="lista-projetos">
      <p>Carregando...</p>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="js/supabase-config.js"></script>
  <script src="js/sidebar.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/comentarios.js"></script>
  <script src="js/projetos.js"></script>
</body>
</html>
